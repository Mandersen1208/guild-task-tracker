<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks • Guild</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 UMD -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .task-text { transition: all 0.1s ease; }
    .completed .task-text { text-decoration: line-through; color: #9ca3af; }
  </style>
</head>
<body class="bg-gray-50 py-8 px-4">
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const ReactDOM = window.ReactDOM;

    function App() {
      const [tasks, setTasks] = React.useState([]);
      const [filter, setFilter] = React.useState('all'); // all | active | completed
      const [inputValue, setInputValue] = React.useState('');
      const [isLoaded, setIsLoaded] = React.useState(false);

      // Frieren: Load from localStorage with integrity
      React.useEffect(() => {
        try {
          const raw = localStorage.getItem('tasks');
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) {
              setTasks(parsed);
            }
          }
        } catch (e) {
          console.warn('Memory load failed, starting fresh');
          localStorage.removeItem('tasks');
        }
        setIsLoaded(true);
      }, []);

      // Frieren: Save on every change
      React.useEffect(() => {
        if (!isLoaded) return;
        try {
          localStorage.setItem('tasks', JSON.stringify(tasks));
        } catch (e) {
          console.error('Failed to persist tasks');
        }
      }, [tasks, isLoaded]);

      const addTask = () => {
        const text = inputValue.trim();
        if (!text) return;
        
        const newTask = {
          id: crypto.randomUUID(),
          text: text,
          completed: false
        };
        
        setTasks(prev => [...prev, newTask]);
        setInputValue('');
      };

      const toggleComplete = (id) => {
        setTasks(prev =>
          prev.map(task =>
            task.id === id ? { ...task, completed: !task.completed } : task
          )
        );
      };

      const deleteTask = (id) => {
        setTasks(prev => prev.filter(task => task.id !== id));
      };

      // Filter logic (computed at render time per Shiroe)
      const filteredTasks = tasks.filter(task => {
        if (filter === 'active') return !task.completed;
        if (filter === 'completed') return task.completed;
        return true;
      });

      const activeCount = tasks.filter(t => !t.completed).length;
      const completedCount = tasks.filter(t => t.completed).length;

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') {
          addTask();
        }
      };

      return React.createElement('div', {
        className: 'max-w-md mx-auto bg-white rounded-2xl shadow-sm border border-gray-100 p-6'
      },
        // Header (Marin)
        React.createElement('div', { className: 'mb-6' },
          React.createElement('h1', { className: 'text-2xl font-semibold text-gray-900 tracking-tight' }, 'Tasks'),
          React.createElement('p', { className: 'text-sm text-gray-500 mt-1' }, 'Stay on top of what matters')
        ),

        // Add Task (Marin + Guts)
        React.createElement('div', { className: 'flex gap-2 mb-6' },
          React.createElement('input', {
            type: 'text',
            value: inputValue,
            onChange: (e) => setInputValue(e.target.value),
            onKeyDown: handleKeyDown,
            placeholder: 'What needs to be done?',
            className: 'flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder:text-gray-400 focus:outline-none focus:border-gray-300 focus:bg-white transition-colors'
          }),
          React.createElement('button', {
            onClick: addTask,
            className: 'px-5 py-3 bg-gray-900 text-white rounded-xl font-medium hover:bg-gray-800 active:bg-black transition-colors flex items-center justify-center'
          }, 'Add')
        ),

        // Filters (Marin)
        React.createElement('div', { className: 'flex gap-1 mb-4 bg-gray-100 p-1 rounded-xl w-fit' },
          React.createElement('button', {
            onClick: () => setFilter('all'),
            className: `px-4 py-1.5 text-sm font-medium rounded-lg transition-colors ${filter === 'all' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-600 hover:text-gray-900'}`
          }, `All (${tasks.length})`),
          React.createElement('button', {
            onClick: () => setFilter('active'),
            className: `px-4 py-1.5 text-sm font-medium rounded-lg transition-colors ${filter === 'active' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-600 hover:text-gray-900'}`
          }, `Active (${activeCount})`),
          React.createElement('button', {
            onClick: () => setFilter('completed'),
            className: `px-4 py-1.5 text-sm font-medium rounded-lg transition-colors ${filter === 'completed' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-600 hover:text-gray-900'}`
          }, `Completed (${completedCount})`)
        ),

        // Task List (Shiroe + Guts + Marin)
        React.createElement('div', { className: 'space-y-1 min-h-[120px]' },
          filteredTasks.length === 0 
            ? React.createElement('div', { className: 'text-center py-8 text-gray-400 text-sm' }, 
                filter === 'all' ? 'No tasks yet. Add one above.' : 
                filter === 'active' ? 'No active tasks.' : 'No completed tasks.')
            : filteredTasks.map(task =>
                React.createElement('div', {
                  key: task.id,
                  className: `group flex items-center gap-3 px-4 py-3 bg-white border border-gray-100 rounded-xl hover:border-gray-200 transition-colors ${task.completed ? 'completed' : ''}`
                },
                  // Checkbox
                  React.createElement('input', {
                    type: 'checkbox',
                    checked: task.completed,
                    onChange: () => toggleComplete(task.id),
                    className: 'w-5 h-5 accent-gray-900 cursor-pointer'
                  }),
                  // Text
                  React.createElement('span', {
                    className: `flex-1 text-gray-900 task-text ${task.completed ? 'line-through text-gray-400' : ''}`
                  }, task.text),
                  // Delete button (hover reveal)
                  React.createElement('button', {
                    onClick: () => deleteTask(task.id),
                    className: 'opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all p-1'
                  },
                    React.createElement('svg', {
                      xmlns: 'http://www.w3.org/2000/svg',
                      className: 'w-4 h-4',
                      fill: 'none',
                      viewBox: '0 0 24 24',
                      stroke: 'currentColor'
                    },
                      React.createElement('path', {
                        strokeLinecap: 'round',
                        strokeLinejoin: 'round',
                        strokeWidth: 2,
                        d: 'M6 18L18 6M6 6h12v12'
                      })
                    )
                  )
                )
              )
        ),

        // Footer hint
        React.createElement('div', { className: 'mt-6 text-center text-xs text-gray-400' },
          'Data saved automatically in your browser'
        )
      );
    }

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
